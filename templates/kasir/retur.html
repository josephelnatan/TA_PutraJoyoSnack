<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Putra Joyo Snack — Retur Barang</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background-color: #FDFBF7; color: #333; }
        .sidebar { width: 250px; background-color: #FFA726; height: 100vh; padding: 20px; box-sizing: border-box; color: white; position: fixed; }
        .sidebar h2 { text-align: center; font-size: 20px; margin-bottom: 20px; }
        .sidebar a { display: block; color: white; padding: 12px 15px; text-decoration: none; border-radius: 5px; margin-bottom: 8px; font-weight: bold; }
        .sidebar a:hover { background-color: #FB8C00; }
        .sidebar .logout-btn { background-color: #E65100; margin-top: 30px; text-align: center; }
        .content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); box-sizing: border-box; }

        .header-section { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .btn-add { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; }
        .btn-add:hover { background-color: #45a049; }

        .search-container { background-color: #FFF8E1; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #FFCC80; display: flex; align-items: center; gap: 10px; }
        .search-container input { padding: 8px; border: 1px solid #FFCC80; border-radius: 4px; width: 250px; }

        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th, .data-table td { border: 1px solid #FFE0B2; padding: 12px; text-align: left; font-size: 14px; }
        .data-table th { background-color: #FFA726; color: white; }
        .data-table tr:nth-child(even) { background-color: #FFFDE7; }

        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-pending { background-color: #FFCDD2; color: #C62828; }
        .badge-disetujui { background-color: #C8E6C9; color: #2E7D32; }
        .badge-ditolak { background-color: #E0E0E0; color: #424242; }

        .btn-update { background-color: #29B6F6; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 12px; }
        .btn-update:hover { background-color: #0288D1; }

        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); padding-top: 60px; }
        .modal-content { background-color: white; margin: auto; padding: 30px; border: 2px solid #FFA726; width: 420px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.2); }
        .modal-content h3 { color: #E65100; margin-top: 0; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; text-align: left; }
        .form-group label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 10px; border: 1px solid #FFCC80; border-radius: 6px; box-sizing: border-box; background-color: #FFFDE7; font-family: inherit; }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-save { background-color: #FFA726; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-save:hover { background-color: #FB8C00; }
        .btn-cancel { background-color: #9E9E9E; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-cancel:hover { background-color: #757575; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Putra Joyo Snack</h2>
        <hr style="border: 0; height: 1px; background: #FFE0B2; margin-bottom: 20px;">
        <a href="/kasir/dashboard">📊 Dashboard</a>
        <a href="/kasir/transaksi">🛒 Transaksi</a>
        <a href="/kasir/retur">↩️ Retur</a>
        <a href="/kasir/pengiriman">🚚 Pengiriman</a>
        <a class="logout-btn" href="/logout">🚪 Logout</a>
    </div>

    <div class="content">
        <div class="header-section">
            <h1>Retur Barang</h1>
            <button class="btn-add" onclick="bukaModal()">+ Tambah Retur</button>
        </div>

        <div class="search-container">
            <label><strong>Cari :</strong></label>
            <input type="text" id="search-retur" placeholder="Nama barang / ID retur..." onkeyup="filterTabel()">
        </div>

        <table class="data-table">
            <thead>
                <tr>
                    <th>ID Retur</th>
                    <th>Tanggal</th>
                    <th>Nama Barang</th>
                    <th>Jumlah</th>
                    <th>Alasan</th>
                    <th>Status</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody id="tabel-retur">
                <tr>
                    <td>RT01</td>
                    <td>01-06-2026</td>
                    <td>Keripik</td>
                    <td>2</td>
                    <td>Produk rusak saat diterima</td>
                    <td><span class="badge badge-pending">Pending</span></td>
                    <td><button class="btn-update" onclick="bukaUpdateStatus('RT01', 'Pending')">Update Status</button></td>
                </tr>
                <tr>
                    <td>RT02</td>
                    <td>02-06-2026</td>
                    <td>Waffer</td>
                    <td>1</td>
                    <td>Kemasan penyok</td>
                    <td><span class="badge badge-disetujui">Disetujui</span></td>
                    <td><button class="btn-update" onclick="bukaUpdateStatus('RT02', 'Disetujui')">Update Status</button></td>
                </tr>
            </tbody>
        </table>
    </div>

    <!-- MODAL TAMBAH RETUR -->
    <div id="modalRetur" class="modal">
        <div class="modal-content">
            <h3>↩️ Tambah Retur</h3>
            <div class="form-group">
                <label>ID Retur :</label>
                <input type="text" placeholder="Contoh: RT03">
            </div>
            <div class="form-group">
                <label>Tanggal :</label>
                <input type="date" id="tanggal-retur">
            </div>
            <div class="form-group">
                <label>Nama Barang :</label>
                <input type="text" placeholder="Nama barang yang diretur...">
            </div>
            <div class="form-group">
                <label>Jumlah :</label>
                <input type="number" min="1" placeholder="1">
            </div>
            <div class="form-group">
                <label>Alasan :</label>
                <textarea rows="3" placeholder="Tulis alasan retur..."></textarea>
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="simpanRetur()">Simpan</button>
                <button class="btn-cancel" onclick="tutupModal()">Batal</button>
            </div>
        </div>
    </div>

    <!-- MODAL UPDATE STATUS -->
    <div id="modalStatus" class="modal">
        <div class="modal-content">
            <h3>Update Status Retur</h3>
            <div class="form-group">
                <label>ID Retur :</label>
                <input type="text" id="update-id" readonly style="background-color: #F5F5F5;">
            </div>
            <div class="form-group">
                <label>Status Baru :</label>
                <select id="update-status">
                    <option value="Pending">Pending</option>
                    <option value="Disetujui">Disetujui</option>
                    <option value="Ditolak">Ditolak</option>
                </select>
            </div>
            <div class="modal-buttons">
                <button class="btn-save" onclick="simpanStatus()">Simpan</button>
                <button class="btn-cancel" onclick="tutupModalStatus()">Batal</button>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('tanggal-retur').value = today;
        });
        function bukaModal() {
            document.getElementById('modalRetur').style.display = 'block';
        }
        function tutupModal() {
            document.getElementById('modalRetur').style.display = 'none';
        }
        function bukaUpdateStatus(idRetur, statusSaat) {
            document.getElementById('update-id').value = idRetur;
            document.getElementById('update-status').value = statusSaat;
            document.getElementById('modalStatus').style.display = 'block';
        }
        function tutupModalStatus() {
            document.getElementById('modalStatus').style.display = 'none';
        }
        function simpanRetur() {
            alert('Data retur berhasil disimpan!');
            tutupModal();
        }
        async function simpanStatus() {
    const id = document.getElementById('update-id').value;
    const status = document.getElementById('update-status').value;

    const res = await fetch('/kasir/retur/update-status', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ id_retur: id, status: status })
    });

    const result = await res.json();
    if (result.success) {
        alert(`Status ${id} berhasil diupdate!`);
        tutupModalStatus();
        location.reload();
    } else {
        alert('Gagal update status: ' + result.error);
    }

        }
        function filterTabel() {
            const keyword = document.getElementById('search-retur').value.toLowerCase();
            document.querySelectorAll('#tabel-retur tr').forEach(row => {
                row.style.display = row.innerText.toLowerCase().includes(keyword) ? '' : 'none';
            });
        }
    </script>

</body>
</html>
