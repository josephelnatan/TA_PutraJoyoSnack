<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Putra Joyo Snack — Retur Barang</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background-color: #FDFBF7; color: #333; }
        .sidebar { width: 250px; background-color: #FFA726; height: 100vh; padding: 20px; box-sizing: border-box; color: white; position: fixed; }
        .sidebar h2 { text-align: center; font-size: 20px; margin-bottom: 20px; }
        .sidebar a { display: block; color: white; padding: 12px 15px; text-decoration: none; border-radius: 5px; margin-bottom: 8px; font-weight: bold; }
        .sidebar a:hover { background-color: #FB8C00; }
        .sidebar .logout-btn { background-color: #E65100; margin-top: 30px; text-align: center; }
        .content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); box-sizing: border-box; }

        .retur-container { display: flex; gap: 30px; margin-top: 20px; }
        .table-side { flex: 2; }
        .form-side { flex: 1; background: white; padding: 25px; border-radius: 12px; border: 2px solid #FFE0B2; box-shadow: 0 4px 6px rgba(0,0,0,0.02); height: fit-content; }

        .data-table { width: 100%; border-collapse: collapse; background: white; }
        .data-table th, .data-table td { border: 1px solid #FFE0B2; padding: 12px; text-align: left; font-size: 14px; }
        .data-table th { background-color: #FFA726; color: white; }
        .data-table tr:nth-child(even) { background-color: #FFFDE7; }
        .data-table tbody tr { cursor: pointer; }
        .data-table tbody tr:hover { background-color: #FFF3E0; }

        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; }
        .badge-pending { background-color: #FFCDD2; color: #C62828; }
        .badge-disetujui { background-color: #C8E6C9; color: #2E7D32; }
        .badge-ditolak { background-color: #E0E0E0; color: #424242; }

        .form-side h3 { margin-top: 0; color: #E65100; font-size: 18px; margin-bottom: 20px; border-bottom: 1px solid #FFE0B2; padding-bottom: 10px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; font-weight: bold; font-size: 14px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 1px solid #FFCC80; border-radius: 6px; box-sizing: border-box; background-color: #FFFDE7; font-family: inherit; }

        .action-buttons { display: flex; gap: 8px; margin-top: 20px; }
        .btn { padding: 10px; width: 100%; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; color: white; font-size: 14px; }
        .btn-save { background-color: #4CAF50; }
        .btn-save:hover { background-color: #45a049; }
        .btn-delete { background-color: #EF5350; }
        .btn-delete:hover { background-color: #D32F2F; }

        .btn-tambah { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-bottom: 15px; }
        .btn-tambah:hover { background-color: #45a049; }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Putra Joyo Snack</h2>
        <hr style="border: 0; height: 1px; background: #FFE0B2; margin-bottom: 20px;">
        <a href="/kasir/dashboard">📊 Dashboard</a>
        <a href="/kasir/transaksi">🛒 Transaksi</a>
        <a href="/kasir/retur">↩️ Retur</a>
        <a href="/kasir/pengiriman">🚚 Pengiriman</a>
        <a class="logout-btn" href="/logout">🚪 Logout</a>
    </div>

    <div class="content">
        <h1>Retur Barang</h1>

        <div class="retur-container">
            <div class="table-side">
                <button class="btn-tambah" onclick="resetForm()">+ Tambah Retur</button>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID Retur</th>
                            <th>Tanggal</th>
                            <th>Barang</th>
                            <th>Jumlah</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr onclick="pilihRetur('RT01', '01-06-2026', 'Keripik', 2, 'Pending', 'Produk rusak saat diterima')">
                            <td>RT01</td>
                            <td>01-06-2026</td>
                            <td>Keripik</td>
                            <td>2</td>
                            <td><span class="badge badge-pending">Pending</span></td>
                        </tr>
                        <tr onclick="pilihRetur('RT02', '02-06-2026', 'Waffer', 1, 'Disetujui', 'Kemasan penyok')">
                            <td>RT02</td>
                            <td>02-06-2026</td>
                            <td>Waffer</td>
                            <td>1</td>
                            <td><span class="badge badge-disetujui">Disetujui</span></td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="form-side">
                <h3>↩️ Detail Retur</h3>
                <div class="form-group">
                    <label>ID Retur :</label>
                    <input type="text" id="f-id" placeholder="Otomatis (RT03...)">
                </div>
                <div class="form-group">
                    <label>Tanggal :</label>
                    <input type="date" id="f-tanggal">
                </div>
                <div class="form-group">
                    <label>Nama Barang :</label>
                    <input type="text" id="f-barang" placeholder="Nama barang yang diretur...">
                </div>
                <div class="form-group">
                    <label>Jumlah :</label>
                    <input type="number" id="f-jumlah" min="1" placeholder="1">
                </div>
                <div class="form-group">
                    <label>Alasan Retur :</label>
                    <textarea id="f-alasan" rows="3" placeholder="Tulis alasan retur..."></textarea>
                </div>
                <div class="form-group">
                    <label>Status :</label>
                    <select id="f-status">
                        <option value="Pending">Pending</option>
                        <option value="Disetujui">Disetujui</option>
                        <option value="Ditolak">Ditolak</option>
                    </select>
                </div>
                <div class="action-buttons">
                    <button class="btn btn-save" onclick="simpanRetur()">Simpan</button>
                    <button class="btn btn-delete" onclick="hapusRetur()">Hapus</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        function pilihRetur(id, tanggal, barang, jumlah, status, alasan) {
            document.getElementById('f-id').value = id;
            const parts = tanggal.split('-');
            document.getElementById('f-tanggal').value = `${parts[2]}-${parts[1]}-${parts[0]}`;
            document.getElementById('f-barang').value = barang;
            document.getElementById('f-jumlah').value = jumlah;
            document.getElementById('f-status').value = status;
            document.getElementById('f-alasan').value = alasan;
        }
        function resetForm() {
            document.getElementById('f-id').value = '';
            document.getElementById('f-tanggal').value = '';
            document.getElementById('f-barang').value = '';
            document.getElementById('f-jumlah').value = '';
            document.getElementById('f-status').value = 'Pending';
            document.getElementById('f-alasan').value = '';
        }
        function simpanRetur() {
            const barang = document.getElementById('f-barang').value;
            if (!barang) { alert('Nama barang wajib diisi!'); return; }
            alert('Data retur berhasil disimpan.');
        }
        function hapusRetur() {
            const id = document.getElementById('f-id').value;
            if (!id) { alert('Pilih retur dari tabel terlebih dahulu.'); return; }
            if (confirm(`Hapus retur ${id}?`)) {
                alert(`Retur ${id} berhasil dihapus.`);
                resetForm();
            }
        }
    </script>

</body>
</html>
