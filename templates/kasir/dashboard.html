<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Putra Joyo Snack — Dashboard Kasir</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; margin: 0; display: flex; background-color: #FDFBF7; color: #333; }
        .sidebar { width: 250px; background-color: #FFA726; height: 100vh; padding: 20px; box-sizing: border-box; color: white; position: fixed; }
        .sidebar h2 { text-align: center; font-size: 20px; margin-bottom: 20px; }
        .sidebar a { display: block; color: white; padding: 12px 15px; text-decoration: none; border-radius: 5px; margin-bottom: 8px; font-weight: bold; }
        .sidebar a:hover { background-color: #FB8C00; }
        .sidebar .logout-btn { background-color: #E65100; margin-top: 30px; text-align: center; }
        .content { margin-left: 250px; padding: 40px; width: calc(100% - 250px); box-sizing: border-box; }
        .header-main { display: flex; justify-content: space-between; align-items: center; }
        .cards-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
        .card { padding: 20px; border-radius: 14px; color: white; box-shadow: 0 6px 18px rgba(0,0,0,0.08); }
        .card-orange { background: linear-gradient(135deg, #FFB74D, #FFA726); }
        .card-blue { background: linear-gradient(135deg, #4FC3F7, #29B6F6); }
        .card-green { background: linear-gradient(135deg, #81C784, #66BB6A); }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Putra Joyo Snack</h2>
        <hr style="border: 0; height: 1px; background: #FFE0B2; margin-bottom: 20px;">
        <a href="/kasir/dashboard">📊 Dashboard</a>
        <a href="/kasir/transaksi">🛒 Transaksi</a>
        <a href="/kasir/retur">↩️ Retur</a>
        <a href="/kasir/pengiriman">🚚 Pengiriman</a>
        <a class="logout-btn" href="/logout">🚪 Logout</a>
    </div>

    <div class="content">
        <div class="header-main">
            <h1>Dashboard Kasir</h1>
            <div>Login sebagai: <strong>Kasir</strong></div>
        </div>

        <hr style="border: 0; height: 1px; background: #FFE0B2; margin: 20px 0;">

        <div class="cards-grid">
            <div class="card card-orange">
                <h4>Jumlah Barang</h4>
                <p style="font-size: 24px; font-weight: bold; margin: 5px 0 0 0;">{{ barang_count }} Item</p>
            </div>
            <div class="card card-blue">
                <h4>Total Stok Tersedia</h4>
                <p style="font-size: 24px; font-weight: bold; margin: 5px 0 0 0;">{{ stok_total }} Unit</p>
            </div>
            <div class="card card-green">
                <h4>Status Sistem</h4>
                <p style="font-size: 24px; font-weight: bold; margin: 5px 0 0 0;">Siap</p>
            </div>
        </div>
    </div>

</body>
</html>
